<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fire/EMS Response Plan Search</title>

  <style>
    body {
      font-family: Arial;
      background: #020617;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input, textarea, button {
      width: 90%;
      max-width: 500px;
      margin: 8px;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .result-card {
      margin-top: 20px;
      padding: 20px;
      background: #020617;
      border: 1px solid #1f2937;
      border-radius: 10px;
    }

    .autocomplete-items {
      text-align: left;
      max-width: 500px;
      margin: auto;
    }

    .autocomplete-item {
      padding: 10px;
      background: #020617;
      border-bottom: 1px solid #1f2937;
      cursor: pointer;
    }

    .autocomplete-item:hover {
      background: #1e293b;
    }

    .autocomplete-active {
      background: #2563eb !important;
    }
  </style>
</head>

<body>

  <!-- ACCESS -->
  <div id="access-section">
    <h2>Enter Access Key</h2>
    <input id="access-key">
    <button id="access-submit">Enter</button>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" style="display:none;">

    <h1 id="agency-banner"></h1>

    <input id="search" placeholder="Enter determinant">

    <div id="autocomplete-list"></div>

    <div id="result"></div>

    <!-- ADMIN PANEL -->
    <div id="admin-panel" style="display:none;">
      <h3>Admin Editor</h3>

      <input id="edit-determinant" placeholder="Determinant">
      <input id="edit-description" placeholder="Description">
      <input id="edit-level" placeholder="Level">

      <textarea id="edit-boise" placeholder="Boise Fire"></textarea>
      <textarea id="edit-meridian" placeholder="Meridian Fire"></textarea>
      <textarea id="edit-eagle" placeholder="Eagle Fire"></textarea>
      <textarea id="edit-kuna" placeholder="Kuna Fire"></textarea>
      <textarea id="edit-midstar" placeholder="MidStar"></textarea>

      <textarea id="edit-notes" placeholder="Notes"></textarea>

      <button onclick="saveEntry()">Save</button>
      <button onclick="exportJSON()">Export JSON</button>

      <input type="file" id="import-file" accept=".json">
      <button onclick="importJSON()">Import JSON</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
